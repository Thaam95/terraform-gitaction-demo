name: Terraform Check and Plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-check.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect GitHub OIDC claims
        uses: actions/github-script@v8
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            const payload = JSON.parse(
              Buffer.from(token.split('.')[1], 'base64url').toString()
            );

            core.info(`aud=${payload.aud}`);
            core.info(`sub=${payload.sub}`);
            core.info(`repository=${payload.repository}`);
            core.info(`repository_id=${payload.repository_id}`);
            core.info(`repository_owner=${payload.repository_owner}`);
            core.info(`repository_owner_id=${payload.repository_owner_id}`);

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.5"

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Terraform Plan
        run: terraform plan -input=false -no-color
